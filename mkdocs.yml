site_name: OnePersonLab
site_url: https://onepersonlab.github.io/onepersonlab-website

repo_name: onepersonlab/onepersonlab-website
repo_url: https://github.com/onepersonlab/onepersonlab-website

theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: purple
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.action.edit
  font:
    text: Inter
    code: Roboto Mono
  favicon: assets/favicon.png
  logo: assets/logo.svg

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.details

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/onepersonlab/onepersonlab-agents
    - icon: fontawesome/brands/discord
      link: https://discord.gg/clawd

extra_css:
  - stylesheets/extra.css

copyright: © 2026 OnePersonLab
